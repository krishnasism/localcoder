name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag override (e.g. v1.0.1)"
        required: false

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Build backend API exe
        run: python packaging/build_backend.py

      - name: Install frontend dependencies
        working-directory: application
        run: npm install

      - name: Make Windows installers
        working-directory: application
        run: npm run make:win

      - name: Collect release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Get-ChildItem -Path application/out/make -Recurse -Include *.exe,*.nupkg,*.zip |
            ForEach-Object { Copy-Item $_.FullName -Destination release/ -Force }
          if (Test-Path application/resources/backend/localcoder-api.exe) {
            Copy-Item application/resources/backend/localcoder-api.exe release/ -Force
          }
          Get-ChildItem release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Localcoder ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
